<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORO NOOK | المنيو الكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-brown: #3B2313; --oro-gold: #D4AF37; --danger: #A93226; --bg-color: #FDFBF7; --white: #ffffff; --whatsapp: #25D366; --dark-olive: #354B2A; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); margin: 0; }
        nav { background-color: var(--primary-brown); color: var(--oro-gold); padding: 20px; text-align: center; font-size: 28px; font-weight: 900; border-bottom: 3px solid var(--oro-gold); }
        .container { display: flex; flex-wrap: wrap; max-width: 1400px; margin: auto; padding: 20px; gap: 20px; }
        .crops-section { width: 100%; background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; margin-bottom: 10px; }
        .crops-section img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        .crops-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .crop-item { background: var(--oro-gold); color: var(--primary-brown); padding: 10px 20px; border-radius: 8px; font-weight: 900; font-size: 1.1em; cursor: pointer; text-align: center; }
        .crop-item.selected-crop { background: var(--primary-brown); color: var(--oro-gold); border: 2px solid var(--danger); }
        .menu-area { flex: 1 1 70%; display: flex; gap: 20px; flex-direction: column; }
        .menu-column { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--white); border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 4px solid var(--primary-brown); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .add-btn { width: 100%; background-color: var(--primary-brown); color: var(--oro-gold); border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; text-align: center; max-width: 400px; }
    </style>
</head>
<body>

<nav>ORO NOOK</nav>

<div class="container">
    <div class="crops-section">
        <img src="https://images.pexels.com/photos/4264047/pexels-photo-4264047.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="محاصيل">
        <div class="crops-list">
            <div class="crop-item" onclick="toggleCrop(this, 'محصول ياباني', 65)">محصول ياباني</div>
            <div class="crop-item" onclick="toggleCrop(this, 'محصول صيني', 65)">محصول صيني</div>
            <div class="crop-item" onclick="toggleCrop(this, 'محصول كوري', 65)">محصول كوري</div>
            <div class="crop-item" onclick="toggleCrop(this, 'محصول يمني', 65)">محصول يمني</div>
        </div>
    </div>

    <main class="menu-area">
        <!-- (تم اختصار الكود هنا لتركيز على الطلب الأساسي، تأكد من إضافة باقي الأصناف بنفس النمط) -->
        <h2 class="section-title">المشروبات والحلى</h2>
        <div class="card"><img src="https://images.pexels.com/photos/37594523/pexels-photo-37594523.jpeg"><div style="padding:10px"><h3>قهوة يوم حار - 15ر.س</h3><button class="add-btn" onclick="toggleCart(this, 'قهوة يوم حار', 15)">إضافة</button></div></div>
    </main>

    <aside>
        <h3>سلة الطلبات 🛒</h3>
        <div id="cart-items">السلة فارغة</div>
        <div style="font-weight:bold; margin:15px 0;">الإجمالي: <span id="total-price">0</span> ر.س</div>
        <p>طريقة الدفع:</p>
        <button class="pay-btn" onclick="selectPayment('Electronic')">💳 تحويل بنكي</button>
        <button class="pay-btn" onclick="selectPayment('Cash')">💵 كاش</button>
        <button class="checkout-btn" onclick="checkout()">تأكيد الطلب</button>
    </aside>
</div>

<!-- نافذة التحويل البنكي -->
<div id="bank-modal" class="modal">
    <div class="modal-content">
        <h3>بيانات التحويل البنكي</h3>
        <!-- هنا تم إدراج بيانات "image_3.png" -->
        <p>الاسم: محمد عبدالله راشد الحميد</p>
        <p>الآيبان: SA22 8000 0592 6080 1600 3943</p>
        <p>بعد التحويل اضغط "تم التحويل" لإرسال الطلب</p>
        <button onclick="sendToWhatsApp()">تم التحويل وإرسال الطلب</button>
    </div>
</div>

<script>
    let cart = {}, total = 0, selectedPayment = '', selectedCrops = {};

    function toggleCrop(btn, name, price) {
        if (selectedCrops[name]) { delete selectedCrops[name]; total -= price; btn.classList.remove('selected-crop'); }
        else { selectedCrops[name] = price; total += price; btn.classList.add('selected-crop'); }
        document.getElementById('total-price').innerText = total;
    }

    function toggleCart(btn, name, price) {
        if (cart[name]) { delete cart[name]; total -= price; btn.innerText = 'إضافة'; }
        else { cart[name] = price; total += price; btn.innerText = 'إلغاء'; }
        document.getElementById('total-price').innerText = total;
    }

    function selectPayment(method) { selectedPayment = method; }

    function checkout() {
        if (total === 0) return alert("السلة فارغة");
        if (selectedPayment === 'Electronic') {
            document.getElementById('bank-modal').style.display = 'flex';
        } else if (selectedPayment === 'Cash') {
            sendToWhatsApp();
        } else {
            alert("يرجى اختيار طريقة الدفع");
        }
    }

    function sendToWhatsApp() {
        let text = "طلب جديد من ORO NOOK:%0A" + Object.keys(cart).join("%0A") + "%0Aالمحاصيل: " + Object.keys(selectedCrops).join("، ") + "%0Aالإجمالي: " + total + " ر.س";
        window.location.href = "https://wa.me/966550341704?text=" + text;
    }
</script>
</body>
</html>
